<h1 class="section">Let's Connect</h1>
  
  
  <form>
  <fieldset>
    <label>Name:</label> <br>
    <input type="text" name="name" size="20" placeholder="Enter your name please" maxlength="15" required>
    
    <br>
    <br>
    
    <label>Email</label> <br>
    <input type="email" name="Email" size="20" placeholder="Enter your Email please" required>
    
<br>
<br>
<br>
    
    <label>Age and birthday:</label> <br>
    <input type="number" name="number" maxlength="2"  placeholder="please put your age" required>
    <input type="date" name="date" placeholder="Your birthday">
    
<br>
<br>
    
    <fieldset>
    
    <legend>Gender:</legend> <br>
    <div class="input">
    Male: <input type="radio" name="Gender" value="Male" checked><br>
    Female: <input type="radio" name="Gender" value="Female" checked>
    </div>
    </fieldset>
    
<br>
<br>
    
    <label>Hobbies:</label> <br>
    <div class="input">
    <input type="checkbox" name="Hobbies" value="Badminton" checked> Badminton  <br>
    <input type="checkbox" name="Hobbies" value="Rubiks Cube"> Rubiks cube <br>
    <input type="checkbox" name="Hobbies" value="Chess"> Chess <br>
    <input type="checkbox" name="Hobbies" value="Sepak Takraw"> Sepak takraw <br>
    <input type="checkbox" name="Hobbies" value="Watching movies"> Watching movies <br>
    </div>
<br>
<br>
    
    <label>Message:</label> <br>
    <textarea name="message" rows="6" cols="40" placeholder="Type your message here"> </textarea>
    
<br>
<br>
    
    <input type="submit" name="submit" value="Enter">
    <input type="reset" name="reset" value="Reset">
    
    
    
  </fieldset>
  </form>
  </body>
